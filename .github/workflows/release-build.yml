name: Build and Attach Release Artifact

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libgtk-4-dev

      - name: Configure build
        run: meson setup build --buildtype=release

      - name: Build
        run: meson compile -C build

      - name: Package artifact
        run: |
          cp build/rsync-gtk ./rsync-gtk
          tar -czf rsync-gtk-${{ github.event.release.tag_name }}-linux-x86_64.tar.gz rsync-gtk

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: rsync-gtk-${{ github.event.release.tag_name }}-linux-x86_64.tar.gz
          overwrite_files: true